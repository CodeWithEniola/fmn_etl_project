fmn_postgres:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST', 'postgres') }}"
      user: "{{ env_var('DBT_USER', 'airflow') }}"
      password: "{{ env_var('DBT_PASSWORD', 'airflow') }}"
      port: "{{ env_var('DBT_PORT', '5432') | int }}"
      dbname: "{{ env_var('DBT_DBNAME', 'airflow') }}"
      schema: "{{ env_var('DBT_SCHEMA', 'public') }}"
      threads: 1